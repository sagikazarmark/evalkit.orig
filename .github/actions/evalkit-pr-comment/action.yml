name: Evalkit PR Comment
description: Run evalkit, diff against a baseline run, and post the markdown diff to a pull request.

inputs:
  dataset:
    description: Path to the dataset JSONL file.
    required: true
  config:
    description: Path to the evalkit TOML config file.
    required: true
  baseline:
    description: Path to the baseline run JSONL file used by `evalkit diff`.
    required: true
  working-directory:
    description: Working directory that contains the Cargo workspace.
    required: false
    default: .
  rust-toolchain:
    description: Rust toolchain to install.
    required: false
    default: stable
  results-output:
    description: Path to write the current run JSONL.
    required: false
    default: .evalkit/current.jsonl
  diff-output:
    description: Path to write the markdown diff.
    required: false
    default: .evalkit/diff.md
  json-output:
    description: Path to write the JSON diff.
    required: false
    default: .evalkit/diff.json
  github-token:
    description: Token used to create or update the pull-request comment.
    required: false
    default: ${{ github.token }}

outputs:
  results-output:
    description: Path to the generated run JSONL.
    value: ${{ steps.paths.outputs.results-output }}
  diff-output:
    description: Path to the generated markdown diff.
    value: ${{ steps.paths.outputs.diff-output }}
  json-output:
    description: Path to the generated JSON diff.
    value: ${{ steps.paths.outputs.json-output }}

runs:
  using: composite
  steps:
    - name: Set output paths
      id: paths
      shell: bash
      run: |
        printf 'results-output=%s\n' '${{ inputs.results-output }}' >> "$GITHUB_OUTPUT"
        printf 'diff-output=%s\n' '${{ inputs.diff-output }}' >> "$GITHUB_OUTPUT"
        printf 'json-output=%s\n' '${{ inputs.json-output }}' >> "$GITHUB_OUTPUT"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Cache Cargo artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.working-directory }} -> target

    - name: Prepare output directories
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p "$(dirname '${{ inputs.results-output }}')"
        mkdir -p "$(dirname '${{ inputs.diff-output }}')"
        mkdir -p "$(dirname '${{ inputs.json-output }}')"

    - name: Run evalkit
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        cargo run -p evalkit-cli -- run \
          --dataset '${{ inputs.dataset }}' \
          --config '${{ inputs.config }}' \
          --output '${{ inputs.results-output }}'

    - name: Diff against baseline
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        cargo run -p evalkit-cli -- diff \
          '${{ inputs.baseline }}' \
          '${{ inputs.results-output }}' \
          --output '${{ inputs.diff-output }}' \
          --json-output '${{ inputs.json-output }}'

    - name: Post pull-request comment
      if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
      uses: actions/github-script@v7
      env:
        DIFF_OUTPUT: ${{ inputs.diff-output }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- evalkit-diff -->';
          const body = `${marker}\n${fs.readFileSync(process.env.DIFF_OUTPUT, 'utf8')}`;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number,
          });
          const existing = comments.find((comment) =>
            comment.user?.type === 'Bot' && typeof comment.body === 'string' && comment.body.includes(marker),
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
          }
